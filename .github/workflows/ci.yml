name: CI

on:
  push:
    branches: [main, "feature/**", "work/**"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Build & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Generate artifacts
        run: |
          go run -tags=gencli ./scripts/gen_cli.go
          rm -rf docs-cli/
          go run ./cmd/pf/ docs --dir ./docs-cli
          git diff --exit-code -- cmd/pf/autogen_gen.go docs-cli

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -short -race ./...

      - name: CLI Sync Check
        run: go run ./scripts/verify_cli_api.go

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Dead code check
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          deadcode -test ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  integration:
    name: Integration (Headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sway openbox dbus-x11 libwayland-client0 libwayland-server0 \
                                 libwlroots-dev libx11-dev libxtst-dev x11-utils xclip \
                                 wl-clipboard xdg-utils xvfb kwrite gnome-text-editor featherpad

      - name: X11 Integration Tests
        run: PF_TEST_DISPLAY_SERVER=headless-x11 go test -v -tags=integration -timeout=60s ./integration -count=1

      - name: Wayland Integration Tests
        run: PF_TEST_DISPLAY_SERVER=headless-wayland go test -v -tags=integration -timeout=60s ./integration -count=1
        env:
          PF_TEST_PREFIX: ci

      - name: Backend Integration Tests
        run: go test -v -tags=integration -timeout=60s ./window ./input ./screen ./clipboard -count=1
