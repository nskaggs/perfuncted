name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    name: Build & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate CLI
        run: go run -tags=gencli ./scripts/gen_cli.go

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted (run gofmt -w .):"
            gofmt -l .
            exit 1
          fi

      - name: Vet & Build
        run: |
          go vet ./...
          go build ./...

      - name: Unit Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: CLI Sync Check
        run: go run ./scripts/verify_cli_api.go

      - name: Static Analysis
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

      - name: Dead Code Check
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          deadcode -test ./...

      - name: Vulnerability Check
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  integration:
    name: Integration (Headless)
    runs-on: ubuntu-latest
    # Integration tests require system dependencies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sway kwrite dbus-x11 libwayland-client0 libwayland-server0 \
                                 libwlroots-dev libx11-dev libxtst-dev x11-utils \
                                 wl-clipboard xdg-utils

      - name: Run Integration Tests
        run: bash scripts/test-integration.sh headless
        env:
          PF_TEST_PREFIX: ci
