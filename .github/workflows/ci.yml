name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: |
          gofmt_out=$(gofmt -l .)
          if [ -n "$gofmt_out" ]; then
            echo "Files not formatted:"
            echo "$gofmt_out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests (race detector)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Module tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Docs generation check
        run: |
          go run ./cmd/pf/ docs --dir ./docs-cli
          git diff --exit-code docs-cli/

      - name: Generate CLI
        run: |
          go run -tags=gencli ./scripts/gen_cli.go
          git diff --exit-code cmd/pf/autogen_gen.go

      - name: CLI/API sync check
        run: |
          go run ./scripts/verify_cli_api.go

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2026.1"
          install-go: false

      - name: Dead code check
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          deadcode -test ./...

      - name: Vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
