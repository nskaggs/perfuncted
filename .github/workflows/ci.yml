name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CGO_ENABLED: "0"

jobs:
  quality:
    name: Build & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - uses: taiki-e/install-action@just
      - name: Install dependencies
        run: just install-dev-tools
      - name: Run Quality Checks
        run: just quality

  integration:
    name: Integration (Headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - uses: taiki-e/install-action@just
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sway openbox dbus-x11 libwayland-client0 libwayland-server0 \
                                 libwlroots-dev libx11-dev libxtst-dev x11-utils xclip \
                                 wl-clipboard xdg-utils xvfb kwrite gnome-text-editor featherpad
      - name: Run Integration Tests
        run: just test-integration

  release-smoke:
    name: Release Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - uses: taiki-e/install-action@just
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sway dbus-x11 libwayland-client0 libwayland-server0 \
                                 wl-clipboard xdg-utils
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot --clean --single-target
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Release Smoke Tests
        run: |
          BIN=$(find dist/ -name 'pf' -type f | head -1)
          echo "Testing binary: $BIN"
          just test-release-binary "$BIN"

