name: CI

on:
  push:
    branches: [main, "feature/**", "work/**"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Build & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Generate CLI
        run: go run -tags=gencli ./scripts/gen_cli.go

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -short -race ./...

      - name: CLI Sync Check
        run: go run ./scripts/verify_cli_api.go

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Dead code check
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          deadcode -test ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  integration:
    name: Integration (Headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sway kwrite pluma dbus-x11 libwayland-client0 libwayland-server0 \
                                 libwlroots-dev libx11-dev libxtst-dev x11-utils \
                                 wl-clipboard xdg-utils xvfb

      - name: X11 Integration Tests (Xvfb)
        run: go test -v -tags=integration -timeout=60s ./window/... ./input/... ./screen/...

      - name: Run Integration Tests
        run: bash scripts/test-integration.sh headless
        env:
          PF_TEST_PREFIX: ci

