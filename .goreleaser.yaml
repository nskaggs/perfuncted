version: 2
project_name: perfuncted

before:
  hooks:
    - go generate ./...
    - go mod tidy
    - go run -tags=gencli ./scripts/gen_cli.go
    - go test -short ./...
    - go run ./scripts/verify_cli_api.go

builds:
  - id: pf
    main: ./cmd/pf
    binary: pf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser

archives:
  - id: archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

brews:
  - name: pf
    description: "Screen automation CLI for perfuncted"
    homepage: "https://github.com/nskaggs/perfuncted"
    directory: Formula
    install: |
      bin.install "pf"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
