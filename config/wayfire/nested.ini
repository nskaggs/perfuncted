# Minimal Wayfire config for nested/headless automation sessions.
# Used by `just nested` to provide a wlroots compositor with all required
# automation protocols: wlr-screencopy, wlr-foreign-toplevel, wlr-virtual-pointer.

[core]
# Only load the plugins needed for automation.
plugins = foreign-toplevel place

# Single workspace — no grid needed for automation.
vwidth = 1
vheight = 1

preferred_decoration_mode = server

[output:WL-1]
# For nested (WLR_BACKENDS=wayland) mode: match the parent compositor resolution.
mode = 1280x720@60000
position = 0,0

[output:HEADLESS-1]
# For headless (WLR_BACKENDS=headless) mode.
mode = 1280x720@60000
position = 0,0
