# Minimal sway config for nested automation sessions.
# This is used by `just nested` to start a borderless, chrome-free sway window
# that behaves like a plain app window from the outer desktop's perspective.

# Black background — no blue-green sway default
output * bg #000000 solid_color

# Set a consistent 1024x768 resolution on all output types so that both
# headless (HEADLESS-1) and X11-backend (X11-1) sessions use the same
# layout, allowing deterministic window geometry in the integration tests.
output HEADLESS-1 resolution 1024x768 position 0,0
output X11-1 resolution 1024x768 position 0,0

# Force virtual output creation for headless sessions
# Note: do NOT include this in nested.conf (wayland backend) — it would create a second window

# No window title bars or borders
default_border none
default_floating_border none

# No gaps — windows fill the available space completely
gaps inner 0
gaps outer 0

# Minimal font (used internally; never shown with borders off)
font pango:monospace 1

# Hide the bar entirely; it can still be toggled with $mod+b if needed
bar {
    mode hide
    status_command true
}
