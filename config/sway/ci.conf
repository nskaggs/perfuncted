# Sway config for CI headless test sessions
# Provides deterministic 1024x768 output for consistent move/resize testing

# Black background — no blue-green sway default
output * bg #000000 solid_color

# Set explicit 1024x768 resolution on all outputs
# This ensures move/resize tests have consistent coordinates
output HEADLESS-1 resolution 1024x768 position 0,0
output X11-1 resolution 1024x768 position 0,0

# Force virtual output creation for headless sessions
exec swaymsg create_output

# No window title bars or borders
default_border none
default_floating_border none

# No gaps — windows fill the available space completely
gaps inner 0
gaps outer 0

# Minimal font (used internally; never shown with borders off)
font pango:monospace 1

# Hide the bar entirely
bar {
    mode hide
    status_command true
}
