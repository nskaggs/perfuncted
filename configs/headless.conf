# Minimal sway config for headless automation sessions.
# No swaybg, no bar — nothing that requires a real display.
# Run with: WLR_BACKENDS=headless WLR_RENDERER=pixman sway -c config/sway/headless.conf

output HEADLESS-1 resolution 1280x720 position 0 0

default_border none
default_floating_border none
gaps inner 0
gaps outer 0
font pango:monospace 1
